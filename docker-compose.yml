# 完整项目 docker-compose.yml
services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trip_planner
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: trip_planner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trip_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端服务
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://trip_planner:${DB_PASSWORD}@db:5432/trip_planner
      PORT: 8080
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy

  # 前端服务
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

  volumes:
    postgres_data:
